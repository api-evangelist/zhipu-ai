naftiko: 1.0.0-alpha2
info:
  label: Z.AI API
  description: 'Z.AI API. 13 operations. Lead operation: Generate Image (Async). Self-contained Naftiko capability covering
    one Zhipu Ai business surface.'
  tags:
  - Zhipu Ai
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    ZHIPU_AI_API_KEY: ZHIPU_AI_API_KEY
capability:

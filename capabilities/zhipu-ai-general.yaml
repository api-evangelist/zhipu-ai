      - name: post
        method: POST
        description: This endpoint is used to query the agent conversation history.Only support slides_glm_agent
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
